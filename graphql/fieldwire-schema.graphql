"""Submittal package record."""
type Submittal {
  id: UUID!
  projectId: UUID!
  number: String!
  title: String!
  status: SubmittalStatus!
  specSectionId: UUID
  ballInCourtId: UUID
  dueDate: DateTime
  createdBy: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: SubmittalDetails
  attachments: [Attachment!]
  watchers: [User!]
