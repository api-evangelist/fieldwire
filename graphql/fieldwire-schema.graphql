  officialResponse: String
  specSection: String
  drawingReference: String
  costImpact: Float
  scheduleImpact: Int
  closedAt: DateTime
  closedBy: UUID
  responses: [JSON!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

