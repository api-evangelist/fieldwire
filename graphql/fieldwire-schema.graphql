"""Submittal with spec section, approval chain, and attachments."""
type SubmittalDetails {
  id: UUID!
  submittalId: UUID!
  description: String
  specSection: String
  revision: String
  approvalChain: [JSON!]
  closedAt: DateTime
  closedBy: UUID
  exportUrl: URL
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Financial Types ──────────────────────────────────────────────────────────

"""Budget line item tied to a cost code."""
type BudgetLineItem {
  id: UUID!
  projectId: UUID!
  costCodeId: UUID!
  description: String!
  budgetedAmount: Float!
  actualAmount: Float
  committedAmount: Float
  pendingAmount: Float
  createdAt: DateTime!
  updatedAt: DateTime!
  costCode: CostCode
  changeOrders: [ChangeOrder!]
}

"""Change order record with status and amounts."""
type ChangeOrder {
  id: UUID!
  projectId: UUID!
  budgetLineItemId: UUID
  number: String!
  title: String!
  status: ChangeOrderStatus!
  amount: Float!
  description: String
  createdBy: UUID!
  approvedBy: UUID
  approvedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Tier cost code for budget categorisation."""
type CostCode {
  id: UUID!
  projectId: UUID!
  code: String!
  description: String!
  division: String
  subdivision: String
  createdAt: DateTime!
  updatedAt: DateTime!
  budgetLineItems: [BudgetLineItem!]
}

# ─── Query ────────────────────────────────────────────────────────────────────

type Query {
  """Retrieve a project by ID."""
  project(id: UUID!): Project

  """List all projects in the account."""
  projects(status: ProjectStatus, region: Region, limit: Int, offset: Int): [Project!]!

  """Retrieve a floorplan by ID."""
  floorplan(id: UUID!): Floorplan

  """List floorplans in a project."""
  floorplans(projectId: UUID!, limit: Int, offset: Int): [Floorplan!]!

  """Retrieve a sheet by ID."""
  sheet(id: UUID!): Sheet

  """List sheets in a floorplan."""
  sheets(floorplanId: UUID!, limit: Int, offset: Int): [Sheet!]!

  """Retrieve a task by ID."""
  task(id: UUID!): Task

  """List tasks in a project."""
  tasks(projectId: UUID!, status: TaskStatus, priority: TaskPriority, assigneeId: UUID, limit: Int, offset: Int): [Task!]!

  """Retrieve a form by ID."""
  form(id: UUID!): Form

  """List forms in a project."""
  forms(projectId: UUID!, status: String, limit: Int, offset: Int): [Form!]!

  """Retrieve a form template by ID."""
  formTemplate(id: UUID!): FormTemplate

  """List account form templates."""
  formTemplates(limit: Int, offset: Int): [FormTemplate!]!

  """Retrieve an attachment by ID."""
  attachment(id: UUID!): Attachment

  """List attachments for an entity."""
  attachments(entityId: UUID!, entityType: String!, limit: Int, offset: Int): [Attachment!]!

  """Retrieve a user by ID."""
  user(id: UUID!): User

  """List users in the account."""
  users(projectId: UUID, role: UserRole, limit: Int, offset: Int): [User!]!

  """Retrieve a team by ID."""
  team(id: UUID!): Team

  """List teams in a project or account."""
  teams(projectId: UUID, limit: Int, offset: Int): [Team!]!

  """Retrieve a company by ID."""
  company(id: UUID!): Company

  """List companies in the account."""
  companies(limit: Int, offset: Int): [Company!]!

  """Retrieve a webhook by ID."""
  webhook(id: UUID!): Webhook

  """List webhooks for a project or account."""
  webhooks(projectId: UUID, limit: Int, offset: Int): [Webhook!]!

  """Retrieve an RFI by ID."""
  rfi(id: UUID!): RFI

  """List RFIs in a project."""
  rfis(projectId: UUID!, status: RFIStatus, limit: Int, offset: Int): [RFI!]!

  """Retrieve a submittal by ID."""
  submittal(id: UUID!): Submittal

  """List submittals in a project."""
  submittals(projectId: UUID!, status: SubmittalStatus, limit: Int, offset: Int): [Submittal!]!

  """Retrieve a budget line item by ID."""
  budgetLineItem(id: UUID!): BudgetLineItem

  """List budget line items in a project."""
  budgetLineItems(projectId: UUID!, costCodeId: UUID, limit: Int, offset: Int): [BudgetLineItem!]!

  """Retrieve a change order by ID."""
  changeOrder(id: UUID!): ChangeOrder

  """List change orders in a project."""
  changeOrders(projectId: UUID!, status: ChangeOrderStatus, limit: Int, offset: Int): [ChangeOrder!]!

  """Retrieve a location by ID."""
  location(id: UUID!): Location

  """List locations in a project."""
  locations(projectId: UUID!, sheetId: UUID, limit: Int, offset: Int): [Location!]!

  """Retrieve a report by ID."""
  report(id: UUID!): Report

  """List reports in a project."""
  reports(projectId: UUID!, type: String, limit: Int, offset: Int): [Report!]!

  """Retrieve a folder node by ID."""
  folderNode(id: UUID!): FolderNode

  """List root folder nodes in a project."""
  folderNodes(projectId: UUID!, parentId: UUID, limit: Int, offset: Int): [FolderNode!]!

  """Retrieve the current API key."""
  apiKey(id: UUID!): APIKey

  """List API keys in the account."""
  apiKeys(limit: Int, offset: Int): [APIKey!]!

  """List pending invites."""
  invites(projectId: UUID, limit: Int, offset: Int): [Invite!]!

  """Search across entity types."""
  search(input: Search!): SearchResults!
}

# ─── Mutation ─────────────────────────────────────────────────────────────────

type Mutation {
  """Exchange a long-lived API key for a short-lived JWT token."""
  createToken(apiKey: String!): Token!

  """Create a new project."""
  createProject(name: String!, region: Region!): Project!

  """Update a project."""
  updateProject(id: UUID!, name: String, status: ProjectStatus): Project!

  """Archive a project."""
  archiveProject(id: UUID!): Project!

  """Create a task in a project."""
  createTask(projectId: UUID!, name: String!, status: TaskStatus, priority: TaskPriority, assigneeId: UUID, sheetId: UUID, positionX: Float, positionY: Float): Task!

  """Update a task."""
  updateTask(id: UUID!, name: String, status: TaskStatus, priority: TaskPriority, assigneeId: UUID, dueDate: DateTime): Task!

  """Delete a task."""
  deleteTask(id: UUID!): Boolean!

  """Create a check item on a task."""
  createChecklistItem(taskId: UUID!, name: String!, sequence: Int): ChecklistItem!

  """Update a check item."""
  updateChecklistItem(id: UUID!, name: String, isCompleted: Boolean, sequence: Int): ChecklistItem!

  """Create a bubble on a sheet."""
  createBubble(sheetId: UUID!, taskId: UUID, positionX: Float!, positionY: Float!, content: String): Bubble!

  """Resolve a bubble."""
  resolveBubble(id: UUID!): Bubble!

  """Create a form record from a template."""
  createForm(projectId: UUID!, templateId: UUID!, name: String!, assignedTo: UUID, dueDate: DateTime): Form!

  """Update a form record."""
  updateForm(id: UUID!, status: String, assignedTo: UUID, dueDate: DateTime): Form!

  """Create a webhook subscription."""
  createWebhook(projectId: UUID, url: URL!, events: [WebhookEvent!]!, entityFilters: [UUID!], projectFilters: [UUID!]): Webhook!

  """Update a webhook subscription."""
  updateWebhook(id: UUID!, url: URL, events: [WebhookEvent!], isActive: Boolean, entityFilters: [UUID!], projectFilters: [UUID!]): Webhook!

  """Delete a webhook subscription."""
  deleteWebhook(id: UUID!): Boolean!

  """Create an RFI."""
  createRFI(projectId: UUID!, subject: String!, question: String, specSection: String, ballInCourtId: UUID, dueDate: DateTime): RFI!

  """Update an RFI."""
  updateRFI(id: UUID!, status: RFIStatus, officialResponse: String, ballInCourtId: UUID): RFI!

  """Create a submittal."""
  createSubmittal(projectId: UUID!, title: String!, specSectionId: UUID, ballInCourtId: UUID, dueDate: DateTime): Submittal!

  """Update a submittal."""
  updateSubmittal(id: UUID!, status: SubmittalStatus, ballInCourtId: UUID): Submittal!

  """Invite a user to a project."""
  createInvite(email: String!, projectId: UUID, teamId: UUID, role: UserRole!): Invite!

  """Create a budget line item."""
  createBudgetLineItem(projectId: UUID!, costCodeId: UUID!, description: String!, budgetedAmount: Float!): BudgetLineItem!

  """Update a budget line item."""
  updateBudgetLineItem(id: UUID!, budgetedAmount: Float, actualAmount: Float): BudgetLineItem!

  """Create a change order."""
  createChangeOrder(projectId: UUID!, title: String!, amount: Float!, budgetLineItemId: UUID, description: String): ChangeOrder!

  """Update a change order status."""
  updateChangeOrder(id: UUID!, status: ChangeOrderStatus, amount: Float): ChangeOrder!
}
