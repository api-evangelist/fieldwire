  exportUrl: URL
  formIds: [UUID!]
  taskIds: [UUID!]
  dateRangeStart: DateTime
  dateRangeEnd: DateTime
  generatedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Team and User Types ──────────────────────────────────────────────────────

"""Team within a project or account."""
type Team {
  id: UUID!
  projectId: UUID
  name: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: TeamDetails
  members: [User!]
}

"""Team membership and permission scope."""
type TeamDetails {
  id: UUID!
  teamId: UUID!
  description: String
  permissions: JSON
  isDefault: Boolean!
  memberCount: Int!
  createdBy: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Fieldwire account user."""
type User {
  id: UUID!
  email: String!
  firstName: String!
  lastName: String!
  role: UserRole!
  isActive: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: UserDetails
}

"""Extended user profile including role and region assignments."""
type UserDetails {
  id: UUID!
  userId: UUID!
  phoneNumber: String
  jobTitle: String
  companyId: UUID
  avatarUrl: URL
  region: Region
  lastLoginAt: DateTime
  projectPermissions: JSON
  teamIds: [UUID!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Company Types ────────────────────────────────────────────────────────────

"""Company or organisation in the Fieldwire account."""
type Company {
  id: UUID!
  name: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: CompanyDetails
  users: [User!]
}

"""Company metadata including logo and contact info."""
type CompanyDetails {
  id: UUID!
  companyId: UUID!
  logoUrl: URL
  website: URL
  address: String
  city: String
  state: String
  country: String
  postalCode: String
  phoneNumber: String
  primaryContactId: UUID
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Access and Auth Types ────────────────────────────────────────────────────

"""Pending project or team invitation."""
type Invite {
  id: UUID!
  email: String!
  projectId: UUID
  teamId: UUID
  role: UserRole!
  expiresAt: DateTime!
  createdAt: DateTime!
  details: InviteDetails
}

"""Invite with expiry, role, and sender."""
type InviteDetails {
  id: UUID!
  inviteId: UUID!
  senderId: UUID!
  message: String
  acceptedAt: DateTime
  acceptedBy: UUID
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Long-lived API key for account access."""
type APIKey {
  id: UUID!
  name: String!
  lastFour: String!
  createdAt: DateTime!
  expiresAt: DateTime
  lastUsedAt: DateTime
  isActive: Boolean!
}

"""Short-lived JWT access token."""
type Token {
  accessToken: String!
  tokenType: String!
  expiresIn: Int!
  expiresAt: DateTime!
  region: Region!
}

# ─── Webhook Types ────────────────────────────────────────────────────────────

"""Webhook subscription configuration."""
type Webhook {
  id: UUID!
  projectId: UUID
  url: URL!
  events: [WebhookEvent!]!
  isActive: Boolean!
  entityFilters: [UUID!]
  projectFilters: [UUID!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Search Types ─────────────────────────────────────────────────────────────

"""Search query parameters."""
input Search {
  query: String!
  projectId: UUID
  entityTypes: [String!]
  dateFrom: DateTime
  dateTo: DateTime
  limit: Int
  offset: Int
}

"""Paginated search results across entity types."""
type SearchResults {
  total: Int!
  offset: Int!
  limit: Int!
  projects: [Project!]
  tasks: [Task!]
  forms: [Form!]
  sheets: [Sheet!]
  attachments: [Attachment!]
  rfis: [RFI!]
  submittals: [Submittal!]
}

# ─── RFI Types ────────────────────────────────────────────────────────────────

"""Request for Information record."""
type RFI {
  id: UUID!
  projectId: UUID!
  number: String!
