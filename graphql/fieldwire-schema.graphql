"""
Fieldwire GraphQL Schema
Conceptual schema derived from the Fieldwire REST API (https://developers.fieldwire.com/).
Covers projects, tasks, plans/sheets, forms, attachments, RFIs, submittals, financials, and webhooks.
"""

# ─── Scalars ────────────────────────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar URL
scalar UUID

# ─── Enums ──────────────────────────────────────────────────────────────────

enum ProjectStatus {
  ACTIVE
  ARCHIVED
  COMPLETED
  TRANSFERRING
}

enum TaskStatus {
  OPEN
  IN_PROGRESS
  RESOLVED
  CLOSED
}

enum TaskPriority {
  CRITICAL
  HIGH
  MEDIUM
  LOW
}

enum AttachmentType {
  PHOTO
  VIDEO
  PDF
  FILE
  MARKUP
}

enum BubbleStatus {
  OPEN
  RESOLVED
}

enum UserRole {
  ADMIN
  STANDARD
  VIEWER
  CONTRACTOR
}

enum WebhookEvent {
  ATTACHMENT_CREATED
  ATTACHMENT_UPDATED
  ATTACHMENT_DELETED
  FLOORPLAN_CREATED
  FLOORPLAN_UPDATED
  FLOORPLAN_DELETED
  FORM_CREATED
  FORM_UPDATED
  FORM_DELETED
  HYPERLINK_CREATED
  HYPERLINK_UPDATED
  HYPERLINK_DELETED
  PROJECT_CREATED
  PROJECT_UPDATED
  PROJECT_ARCHIVED
  SHEET_CREATED
  SHEET_UPDATED
  SHEET_UPLOADED
  TASK_CREATED
  TASK_UPDATED
  TASK_DELETED
  TASK_CHECK_ITEM_CREATED
  TASK_CHECK_ITEM_UPDATED
  TASK_RELATION_CREATED
  TASK_RELATION_DELETED
}

enum Region {
  US
  EU
}

enum RFIStatus {
  DRAFT
  OPEN
  ANSWERED
  CLOSED
}

enum SubmittalStatus {
  DRAFT
  SUBMITTED
  UNDER_REVIEW
  APPROVED
  APPROVED_AS_NOTED
  REJECTED
  REVISE_AND_RESUBMIT
}

enum ChangeOrderStatus {
  DRAFT
  PENDING
  APPROVED
  REJECTED
  VOIDED
}

enum FormFieldType {
  TEXT
  NUMBER
  DATE
  DROPDOWN
  CHECKBOX
  SIGNATURE
  PHOTO
  TABLE
}

# ─── Project Types ───────────────────────────────────────────────────────────

"""Top-level construction project."""
type Project {
  id: UUID!
  name: String!
  status: ProjectStatus!
  region: Region!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: ProjectDetails
  floorplans: [Floorplan!]
  tasks: [Task!]
  forms: [Form!]
  teams: [Team!]
  users: [User!]
  webhooks: [Webhook!]
  folders: [FolderNode!]
  reports: [Report!]
  rfis: [RFI!]
  submittals: [Submittal!]
  budgetLineItems: [BudgetLineItem!]
  changeOrders: [ChangeOrder!]
}

"""Extended project metadata."""
type ProjectDetails {
  id: UUID!
  projectId: UUID!
  description: String
  address: String
  city: String
  state: String
  country: String
  postalCode: String
  startDate: DateTime
  endDate: DateTime
  customAttributes: JSON
  transferState: String
  totalTasks: Int
  openTasks: Int
  resolvedTasks: Int
  totalSheets: Int
  totalForms: Int
  totalAttachments: Int
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Floorplan and Sheet Types ───────────────────────────────────────────────

"""Drawing set (plan set) within a project."""
type Floorplan {
  id: UUID!
  projectId: UUID!
  name: String!
  sequence: Int
  createdAt: DateTime!
  updatedAt: DateTime!
  details: FloorplanDetails
  levels: [FloorplanLevel!]
  sheets: [Sheet!]
}

"""Extended floorplan metadata including BIM links."""
type FloorplanDetails {
  id: UUID!
  floorplanId: UUID!
  discipline: String
  phase: String
  collectionId: UUID
  bimModelId: UUID
  isArchived: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Hierarchical level in a floorplan collection."""
type FloorplanLevel {
  id: UUID!
  floorplanId: UUID!
  name: String!
  elevation: Float
  sequence: Int
  sheets: [Sheet!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Individual drawing sheet (PDF page or raster image)."""
type Sheet {
  id: UUID!
  floorplanId: UUID!
  projectId: UUID!
  name: String!
  sequence: Int
  thumbnailUrl: URL
  fullUrl: URL
  createdAt: DateTime!
  updatedAt: DateTime!
  details: SheetDetails
  revisions: [SheetRevision!]
  tasks: [Task!]
  bubbles: [Bubble!]
  hyperlinks: [Hyperlink!]
  locations: [Location!]
}

"""Sheet metadata including auto-extracted number and title."""
type SheetDetails {
  id: UUID!
  sheetId: UUID!
  sheetNumber: String
  sheetTitle: String
  discipline: String
  pageCount: Int
  fileSize: Int
  mimeType: String
  uploadedBy: UUID
  calibrationScale: Float
  calibrationUnit: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Versioned revision of a sheet."""
type SheetRevision {
  id: UUID!
  sheetId: UUID!
  revisionNumber: Int!
  uploadedBy: UUID!
  fileUrl: URL
  createdAt: DateTime!
}

# ─── Task Types ──────────────────────────────────────────────────────────────

"""Construction task — punch list item, RFI-as-task, or work assignment."""
type Task {
  id: UUID!
  projectId: UUID!
  name: String!
  status: TaskStatus!
  priority: TaskPriority
  dueDate: DateTime
  assigneeId: UUID
  creatorId: UUID
  locationId: UUID
  sheetId: UUID
  createdAt: DateTime!
  updatedAt: DateTime!
  details: TaskDetails
  checklistItems: [ChecklistItem!]
  bubbles: [Bubble!]
  attachments: [Attachment!]
  category: TaskCategory
}

"""Extended task fields including custom attributes."""
type TaskDetails {
  id: UUID!
  taskId: UUID!
  description: String
  cost: Float
  costCode: String
  taskTypeId: UUID
  customAttributes: JSON
  completedAt: DateTime
  completedBy: UUID
  verifiedAt: DateTime
  verifiedBy: UUID
  startedAt: DateTime
  positionX: Float
  positionY: Float
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Project-defined category grouping tasks."""
type TaskCategory {
  id: UUID!
  projectId: UUID!
  name: String!
  color: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Location Types ──────────────────────────────────────────────────────────

"""Named location pinned on a floorplan."""
type Location {
  id: UUID!
  projectId: UUID!
  sheetId: UUID
  name: String!
  positionX: Float
  positionY: Float
  createdAt: DateTime!
  updatedAt: DateTime!
  details: LocationDetails
  tasks: [Task!]
}

"""Extended location with area and associated tasks."""
type LocationDetails {
  id: UUID!
  locationId: UUID!
  description: String
  area: LocationArea
  taskCount: Int
  openTaskCount: Int
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Bounded region on a sheet used for spatial filtering."""
type LocationArea {
  minX: Float!
  minY: Float!
  maxX: Float!
  maxY: Float!
  unit: String
}

# ─── Attachment Types ─────────────────────────────────────────────────────────

"""Photo, video, PDF, or file attached to a task or form."""
type Attachment {
  id: UUID!
  projectId: UUID!
  entityId: UUID
  entityType: String
  type: AttachmentType!
  filename: String!
  fileUrl: URL
  thumbnailUrl: URL
  fileSize: Int
  mimeType: String
  uploadedBy: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: AttachmentDetails
}

"""Extended attachment fields including markup GeoJSON."""
type AttachmentDetails {
  id: UUID!
  attachmentId: UUID!
  markupGeoJson: JSON
  markupFlattenedUrl: URL
  description: String
  takenAt: DateTime
  latitude: Float
  longitude: Float
  awsToken: String
  awsBucket: String
  awsKey: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Form Types ───────────────────────────────────────────────────────────────

"""Form record captured in the field."""
type Form {
  id: UUID!
  projectId: UUID!
  templateId: UUID!
  name: String!
  status: String
  createdBy: UUID!
  assignedTo: UUID
  dueDate: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
  details: FormDetails
  template: FormTemplate
}

"""Extended form fields including signatures and section inputs."""
type FormDetails {
  id: UUID!
  formId: UUID!
  description: String
  sectionInputs: JSON
  signatures: [JSON!]
  attachments: [Attachment!]
  completedAt: DateTime
  completedBy: UUID
  exportUrl: URL
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Account-level form template."""
type FormTemplate {
  id: UUID!
  name: String!
  description: String
  version: Int!
  isPublished: Boolean!
  createdBy: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: FormTemplateDetails
  fields: [FormField!]
}

"""Template metadata including field definitions."""
type FormTemplateDetails {
  id: UUID!
  templateId: UUID!
  sections: JSON
  logoUrl: URL
  footerText: String
  allowPhotos: Boolean!
  requireSignature: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Individual field definition within a form template."""
type FormField {
  id: UUID!
  templateId: UUID!
  label: String!
  type: FormFieldType!
  required: Boolean!
  sequence: Int!
  sectionId: UUID
  details: FormFieldDetails
}

"""Field type, options, and validation rules."""
type FormFieldDetails {
  id: UUID!
  fieldId: UUID!
  placeholder: String
  defaultValue: String
  options: [String!]
  minValue: Float
  maxValue: Float
  minLength: Int
  maxLength: Int
  helpText: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Checklist Types ──────────────────────────────────────────────────────────

"""Template checklist associated with a task type."""
type Checklist {
  id: UUID!
  projectId: UUID!
  taskTypeId: UUID
  name: String!
  itemCount: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: ChecklistDetails
  items: [ChecklistItem!]
}

"""Checklist metadata and item list."""
type ChecklistDetails {
  id: UUID!
  checklistId: UUID!
  description: String
  isTemplate: Boolean!
  createdBy: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Individual check item in a checklist."""
type ChecklistItem {
  id: UUID!
  taskId: UUID!
  checklistId: UUID
  name: String!
  isCompleted: Boolean!
  sequence: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: ChecklistItemDetails
}

"""Check item with completion state and assignee."""
type ChecklistItemDetails {
  id: UUID!
  checkItemId: UUID!
  description: String
  completedAt: DateTime
  completedBy: UUID
  dueDate: DateTime
  assigneeId: UUID
  attachments: [Attachment!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Note and Bubble Types ────────────────────────────────────────────────────

"""Text comment associated with a task or location."""
type Note {
  id: UUID!
  entityId: UUID!
  entityType: String!
  content: String!
  authorId: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
  details: NoteDetails
}

"""Note with author, timestamp, and attachments."""
type NoteDetails {
  id: UUID!
  noteId: UUID!
  editedAt: DateTime
  attachments: [Attachment!]
  mentions: [UUID!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Link between two sheets or an external URL."""
type Hyperlink {
  id: UUID!
  sourceSheetId: UUID!
  targetSheetId: UUID
  targetUrl: URL
  anchorX: Float
  anchorY: Float
  targetX: Float
  targetY: Float
  label: String
  createdAt: DateTime!
  updatedAt: DateTime!
  details: HyperlinkDetails
}

"""Hyperlink with anchor point and target coordinates."""
type HyperlinkDetails {
  id: UUID!
  hyperlinkId: UUID!
  isMultiLink: Boolean!
  linkedSheetIds: [UUID!]
  color: String
  iconType: String
  createdBy: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Comment, photo, video, or attachment pinned on a sheet."""
type Bubble {
  id: UUID!
  sheetId: UUID!
  taskId: UUID
  authorId: UUID!
  status: BubbleStatus!
  positionX: Float
  positionY: Float
  createdAt: DateTime!
  updatedAt: DateTime!
  details: BubbleDetails
  attachments: [Attachment!]
}

"""Bubble with position, author, and media."""
type BubbleDetails {
  id: UUID!
  bubbleId: UUID!
  content: String
  mentions: [UUID!]
  resolvedAt: DateTime
  resolvedBy: UUID
  attachments: [Attachment!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── File and Folder Types ────────────────────────────────────────────────────

"""Node in the project file folder hierarchy."""
type FolderNode {
  id: UUID!
  projectId: UUID!
  parentId: UUID
  name: String!
  isFolder: Boolean!
  sequence: Int
  createdAt: DateTime!
  updatedAt: DateTime!
  children: [FolderNode!]
  files: [FileDetails!]
}

"""File metadata including storage URL and MIME type."""
type FileDetails {
  id: UUID!
  folderId: UUID!
  projectId: UUID!
  filename: String!
  fileUrl: URL!
  thumbnailUrl: URL
  mimeType: String!
  fileSize: Int!
  uploadedBy: UUID!
  description: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─── Report Types ─────────────────────────────────────────────────────────────

"""Generated project report."""
type Report {
  id: UUID!
  projectId: UUID!
  name: String!
  type: String!
  createdBy: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
