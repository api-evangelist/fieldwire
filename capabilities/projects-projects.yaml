naftiko: 1.0.0-alpha2
info:
  label: Fieldwire Projects API — Projects
  description: 'Fieldwire Projects API — Projects. 6 operations covering project list, create, read, update, delete,
    and restore. Region-scoped to US or EU project hosts.'
  tags:
  - Fieldwire
  - Projects
  - Construction
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FIELDWIRE_ACCESS_TOKEN: FIELDWIRE_ACCESS_TOKEN
    FIELDWIRE_REGION_HOST: FIELDWIRE_REGION_HOST
capability:
  consumes:
  - type: http
    namespace: projects-projects
    baseUri: '{{env.FIELDWIRE_REGION_HOST}}'
    description: Fieldwire Projects business capability. Use client-api.us.fieldwire.com or client-api.eu.fieldwire.com depending on the account region.
    resources:
    - name: projects
      path: /api/v3/projects
      operations:
      - name: getprojects
        method: GET
        description: Get Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          required: false
      - name: createproject
        method: POST
        description: Create Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: project
      path: /api/v3/projects/{project_id}
      operations:
      - name: getprojectbyid
        method: GET
        description: Get Project By ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: integer
          required: true
      - name: updateprojectbyid
        method: PATCH
        description: Update Project By ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deleteprojectbyid
        method: DELETE
        description: Delete Project By ID
        inputParameters:
        - name: project_id
          in: path
          type: integer
          required: true
    authentication:
      type: bearer
      value: '{{env.FIELDWIRE_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: projects-projects-rest
    port: 8080
    description: REST adapter for Fieldwire Projects.
    resources:
    - path: /v1/projects
      name: projects
      operations:
      - method: GET
        name: getprojects
        call: projects-projects.getprojects
        with:
          status: rest.query.status
        outputParameters:
        - type: array
          mapping: $.
      - method: POST
        name: createproject
        call: projects-projects.createproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project_id}
      name: project
      operations:
      - method: GET
        name: getprojectbyid
        call: projects-projects.getprojectbyid
        with:
          project_id: rest.path.project_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateprojectbyid
        call: projects-projects.updateprojectbyid
        with:
          project_id: rest.path.project_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteprojectbyid
        call: projects-projects.deleteprojectbyid
        with:
          project_id: rest.path.project_id
  - type: mcp
    namespace: projects-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fieldwire Projects.
    tools:
    - name: fieldwire-list-projects
      description: List Fieldwire projects in the account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: projects-projects.getprojects
      with:
        status: tools.status
      outputParameters:
      - type: array
        mapping: $.
    - name: fieldwire-create-project
      description: Create a new construction project in Fieldwire.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: projects-projects.createproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fieldwire-get-project
      description: Get a single Fieldwire project by ID.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: projects-projects.getprojectbyid
      with:
        project_id: tools.project_id
      outputParameters:
      - type: object
        mapping: $.
    - name: fieldwire-update-project
      description: Update a Fieldwire project.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: projects-projects.updateprojectbyid
      with:
        project_id: tools.project_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fieldwire-delete-project
      description: Archive (soft-delete) a Fieldwire project.
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: projects-projects.deleteprojectbyid
      with:
        project_id: tools.project_id
