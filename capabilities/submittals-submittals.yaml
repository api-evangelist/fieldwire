naftiko: 1.0.0-alpha2
info:
  label: Fieldwire Submittals API — Submittals
  description: Submittal lifecycle within a Fieldwire project.
  tags: [Fieldwire, Submittals, Construction]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FIELDWIRE_ACCESS_TOKEN: FIELDWIRE_ACCESS_TOKEN
    FIELDWIRE_REGION_HOST: FIELDWIRE_REGION_HOST
capability:
  consumes:
  - type: http
    namespace: submittals-submittals
    baseUri: '{{env.FIELDWIRE_REGION_HOST}}'
    description: Fieldwire Submittals business capability.
    resources:
    - name: project-submittals
      path: /api/v3/projects/{project_id}/submittals
      operations:
      - name: getsubmittalsinproject
        method: GET
        description: Get Submittals In Project
        inputParameters: [{ name: project_id, in: path, type: integer, required: true }]
        outputParameters: [{ name: result, type: array, value: $. }]
      - name: createsubmittalinproject
        method: POST
        description: Create Submittal In Project
        inputParameters:
        - { name: project_id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
        outputParameters: [{ name: result, type: object, value: $. }]
    - name: project-spec-sections
      path: /api/v3/projects/{project_id}/spec_sections
      operations:
      - name: getspecsectionsinproject
        method: GET
        description: Get Spec Sections In Project
        inputParameters: [{ name: project_id, in: path, type: integer, required: true }]
        outputParameters: [{ name: result, type: array, value: $. }]
    authentication:
      type: bearer
      value: '{{env.FIELDWIRE_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: submittals-submittals-rest
    port: 8080
    description: REST adapter for Fieldwire Submittals.
    resources:
    - path: /v1/projects/{project_id}/submittals
      name: project-submittals
      operations:
      - method: GET
        name: getsubmittalsinproject
        call: submittals-submittals.getsubmittalsinproject
        with: { project_id: rest.path.project_id }
        outputParameters: [{ type: array, mapping: $. }]
      - method: POST
        name: createsubmittalinproject
        call: submittals-submittals.createsubmittalinproject
        with: { project_id: rest.path.project_id, body: rest.body }
        outputParameters: [{ type: object, mapping: $. }]
    - path: /v1/projects/{project_id}/spec_sections
      name: project-spec-sections
      operations:
      - method: GET
        name: getspecsectionsinproject
        call: submittals-submittals.getspecsectionsinproject
        with: { project_id: rest.path.project_id }
        outputParameters: [{ type: array, mapping: $. }]
  - type: mcp
    namespace: submittals-submittals-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fieldwire Submittals.
    tools:
    - name: fieldwire-list-submittals
      description: List submittals in a Fieldwire project.
      hints: { readOnly: true, destructive: false, idempotent: true }
      call: submittals-submittals.getsubmittalsinproject
      with: { project_id: tools.project_id }
      outputParameters: [{ type: array, mapping: $. }]
    - name: fieldwire-create-submittal
      description: Open a new submittal on a Fieldwire project.
      hints: { readOnly: false, destructive: false, idempotent: false }
      call: submittals-submittals.createsubmittalinproject
      with: { project_id: tools.project_id, body: tools.body }
      outputParameters: [{ type: object, mapping: $. }]
    - name: fieldwire-list-spec-sections
      description: List specification sections used to organise submittals.
      hints: { readOnly: true, destructive: false, idempotent: true }
      call: submittals-submittals.getspecsectionsinproject
      with: { project_id: tools.project_id }
      outputParameters: [{ type: array, mapping: $. }]
