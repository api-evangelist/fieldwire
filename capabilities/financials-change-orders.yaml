naftiko: 1.0.0-alpha2
info:
  label: Fieldwire Financials API — Change Orders
  description: Project change orders that adjust scope and budget on a Fieldwire project.
  tags: [Fieldwire, Financials, Change Orders, Construction]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FIELDWIRE_ACCESS_TOKEN: FIELDWIRE_ACCESS_TOKEN
    FIELDWIRE_REGION_HOST: FIELDWIRE_REGION_HOST
capability:
  consumes:
  - type: http
    namespace: financials-change-orders
    baseUri: '{{env.FIELDWIRE_REGION_HOST}}'
    description: Fieldwire Project Change Orders business capability.
    resources:
    - name: project-change-orders
      path: /api/v3/projects/{project_id}/change_orders
      operations:
      - name: getchangeordersinproject
        method: GET
        description: Get Change Orders In Project
        inputParameters: [{ name: project_id, in: path, type: integer, required: true }]
        outputParameters: [{ name: result, type: array, value: $. }]
      - name: createchangeorderinproject
        method: POST
        description: Create Change Order In Project
        inputParameters:
        - { name: project_id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
        outputParameters: [{ name: result, type: object, value: $. }]
    authentication:
      type: bearer
      value: '{{env.FIELDWIRE_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: financials-change-orders-rest
    port: 8080
    description: REST adapter for Fieldwire Change Orders.
    resources:
    - path: /v1/projects/{project_id}/change_orders
      name: project-change-orders
      operations:
      - method: GET
        name: getchangeordersinproject
        call: financials-change-orders.getchangeordersinproject
        with: { project_id: rest.path.project_id }
        outputParameters: [{ type: array, mapping: $. }]
      - method: POST
        name: createchangeorderinproject
        call: financials-change-orders.createchangeorderinproject
        with: { project_id: rest.path.project_id, body: rest.body }
        outputParameters: [{ type: object, mapping: $. }]
  - type: mcp
    namespace: financials-change-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fieldwire Change Orders.
    tools:
    - name: fieldwire-list-change-orders
      description: List change orders on a Fieldwire project.
      hints: { readOnly: true, destructive: false, idempotent: true }
      call: financials-change-orders.getchangeordersinproject
      with: { project_id: tools.project_id }
      outputParameters: [{ type: array, mapping: $. }]
    - name: fieldwire-create-change-order
      description: Create a new change order on a Fieldwire project.
      hints: { readOnly: false, destructive: false, idempotent: false }
      call: financials-change-orders.createchangeorderinproject
      with: { project_id: tools.project_id, body: tools.body }
      outputParameters: [{ type: object, mapping: $. }]
