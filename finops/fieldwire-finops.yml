description: |
  FOCUS-aligned FinOps definition for Fieldwire by Hilti. Fieldwire is sold as a per-seat,
  per-month SaaS subscription billed annually, with four published plans (Basic, Pro, Business,
  Business Plus) and a custom enterprise tier ("Custom Contracts") that unlocks API access, SSO,
  and dedicated success.
