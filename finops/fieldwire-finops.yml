chargeBreakdown:
  - dimension: Plan
    description: Subscription plan name (Basic, Pro, Business, Business Plus, Custom Contracts).
  - dimension: User seats
    description: Count of named users on the account; the per-seat rate multiplies by this count.
  - dimension: Region
    description: US or EU regional API host; data residency tracked at the project level.
