    Business: '64.00'
    Business Plus: '89.00'
  BillingCurrency: USD
  CommitmentDiscountType: Annual Pre-Commit (annual billing required for published prices)
costOptimizationLevers:
  - Right-size the plan tier — only pay for Business Plus per seat if the team actually uses RFIs, submittals, change orders, and budgets.
  - Reclaim deactivated user seats promptly; Fieldwire bills per named user.
  - Bundle API integration projects under the Custom Contracts tier rather than upgrading every seat.
  - Use the free Basic tier for trials and pilots (up to 5 users, 3 projects, 100 sheets).
notes:
  - API access is included only in the Custom Contracts tier; budget conversations for integration work should include the upgrade cost.
  - Hilti Group is the parent company; enterprise procurement can be aligned with broader Hilti agreements.
